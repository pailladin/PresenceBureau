<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planning Présence Équipe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="board-wrap">
      <header class="board-header">
        <h1>Présence équipe</h1>
        <p id="week-range"></p>
      </header>

      <section class="status-tools" aria-label="Ajout de statut personnalisé">
        <div class="top-controls">
          <div class="legend" aria-label="Légende des statuts" id="status-legend"></div>
          <form id="custom-status-form" class="custom-status-form">
            <label for="custom-status-name">Nouveau statut</label>
            <input id="custom-status-name" name="customStatus" type="text" maxlength="20" placeholder="Ex: Paris" required />
            <button type="submit">Ajouter</button>
          </form>
        </div>
        <p class="halfday-help">Clic: change le statut. Double-clic: demi-journée. Clic droit: copie au jour suivant.</p>
      </section>

      <section class="table-area" aria-label="Tableau des présences">
        <div class="table-scroll">
          <table id="presence-table">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="member-tools" aria-label="Ajout de personne">
        <form id="member-form" class="member-form">
          <label for="member-name">Nouvelle personne</label>
          <input id="member-name" name="memberName" type="text" maxlength="40" placeholder="Ex: Sophie" required />
          <input id="member-avatar" name="memberAvatar" type="text" maxlength="200" placeholder="URL photo (optionnel)" />
          <button type="submit">Ajouter</button>
        </form>
      </section>
    </main>

    <div id="member-edit-modal" class="modal" aria-hidden="true">
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="member-edit-title">
        <h2 id="member-edit-title">Modifier la personne</h2>
        <form id="member-edit-form" class="member-edit-form">
          <label for="member-edit-name">Nom</label>
          <input id="member-edit-name" name="memberEditName" type="text" maxlength="40" required />
          <label for="member-edit-avatar">URL photo</label>
          <input id="member-edit-avatar" name="memberEditAvatar" type="text" maxlength="200" />
          <div class="modal-actions">
            <button type="button" id="member-edit-cancel">Annuler</button>
            <button type="submit">Enregistrer</button>
          </div>
        </form>
      </div>
    </div>

    <script src="/config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
